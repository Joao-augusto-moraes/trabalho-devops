name: CI/CD Pipeline Python

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requeriments.txt || true
    - name: Teste do CRUD (CI)
      run: |
        pytest test_crud.py
    - name: Simular Deploy (CD)
      run: |
        echo "Deploy simulado com sucesso no ambiente de produção!"
    - name: Alerta no Discord
      uses: sarisia/actions-status-discord@v1
      if: always()
      with:
        webhook: ${{ secrets.LIZARD_HOOK }}
        status: ${{ job.status }}
        title: "Status da Pipeline CI/CD"
        description: "O workflow finalizou na branch ${{ github.ref_name }}"
name: CI/CD Pipeline Python

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requeriments.txt || true
    - name: Teste do CRUD (CI)
      run: |
        python crud.py
    - name: Simular Deploy (CD)
      run: |
        echo "Deploy simulado com sucesso no ambiente de produção!"